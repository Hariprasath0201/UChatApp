server.port=8080

# FIX: never commit real passwords. These now read from environment variables,
# falling back to local dev defaults only when the env vars aren't set.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:chat_app_db}
spring.datasource.username=${DB_USER:chatapp_user}
spring.datasource.password=${DB_PASSWORD:changeme}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

translation.api.url=${TRANSLATION_API_URL:http://localhost:5000/translate}
